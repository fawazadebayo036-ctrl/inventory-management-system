<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg2: #0f1525;
      --bg3: #151c30;
      --border: rgba(255,255,255,0.06);
      --accent: #00e5a0;
      --accent2: #0066ff;
      --danger: #ff4d6d;
      --warning: #ffb347;
      --text: #e8eaf0;
      --muted: #6b7399;
      --card: #111827;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      margin: 0;
    }
    /* Sidebar */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      padding: 0;
      z-index: 100;
    }
    .sidebar-brand {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--accent);
    }
    .sidebar-brand span { color: var(--text); }
    .sidebar-nav { padding: 16px 10px; flex: 1; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 13.5px;
      font-weight: 400;
      text-decoration: none;
      transition: all 0.15s;
      margin-bottom: 2px;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(0,229,160,0.08);
      color: var(--accent);
    }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 16px 10px;
      border-top: 1px solid var(--border);
    }
    /* Main content */
    .main-wrap {
      margin-left: 220px;
      padding: 32px 36px;
      min-height: 100vh;
    }
    /* Cards */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(255,255,255,0.12); }
    .stat-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      line-height: 1;
    }
    .stat-value.danger { color: var(--danger); }
    .stat-value.accent { color: var(--accent); }
    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 14px;
      font-size: 13.5px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    .data-table tr:last-child td { border-bottom: none; }
    /* Badges */
    .badge-low {
      background: rgba(255,77,109,0.12);
      color: var(--danger);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 7px;
      border-radius: 5px;
      letter-spacing: 0.04em;
      border: 1px solid rgba(255,77,109,0.2);
    }
    /* Buttons */
    .btn-accent {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-accent:hover { opacity: 0.85; color: #000; }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: rgba(255,255,255,0.04); }
    .btn-danger-outline {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255,77,109,0.3);
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-danger-outline:hover { background: rgba(255,77,109,0.08); color: var(--danger); }
    /* Search */
    .search-input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 14px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
      transition: border-color 0.15s;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    /* Alert */
    .alert-warn {
      background: rgba(255,179,71,0.08);
      border: 1px solid rgba(255,179,71,0.2);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--warning);
      font-size: 13px;
    }
    /* Page header */
    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }
    .page-sub {
      font-size: 12.5px;
      color: var(--muted);
      margin-top: 2px;
    }
    /* Table container */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }


    body.light {
      --bg: #f5f6fa;
      --bg2: #ffffff;
      --bg3: #eef0f5;
      --border: rgba(0,0,0,0.08);
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
    }

    @media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 200;
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .main-wrap {
    margin-left: 0;
    padding: 16px 18px;
  }
  .topbar {
    display: flex;
  }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 150;
  }
  .overlay.open {
    display: block;
  }
}
@media (min-width: 769px) {
  .topbar { display: none; }
}
  </style>
</head>
<body>

    <!-- Mobile overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Mobile topbar -->
<div class="topbar" style="background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 18px; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;">
  <span style="font-family:'DM Mono',monospace; font-size:14px; color:var(--accent);">Stock<span style="color:var(--text);">Sense</span></span>
  <button onclick="openSidebar()" style="background:none; border:none; cursor:pointer; padding:4px; color:var(--text);">
    <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
</div>

<div class="sidebar">
  <div class="sidebar-brand">Inventory<span>Manager</span></div>
  <nav class="sidebar-nav">
    <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="1.5"/></svg>
      Dashboard
    </a>
    <a href="{% url 'sales_page' %}" class="nav-link {% if request.resolver_match.url_name == 'sales_page' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.4 5.6M17 13l1.4 5.6M9 19.5a.5.5 0 11-1 0 .5.5 0 011 0zm7 0a.5.5 0 11-1 0 .5.5 0 011 0z"/></svg>
      New Sale
    </a>
    <a href="{% url 'sales_history' %}" class="nav-link {% if request.resolver_match.url_name == 'sales_history' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Sales History
    </a>
    <a href="{% url 'chat_page' %}" class="nav-link {% if request.resolver_match.url_name == 'chat_page' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      AI Assistant
    </a>
    <a href="{% url 'inventory_pdf_preview' %}" class="nav-link" target="_blank">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Export PDF
    </a>
    {% if request.user.is_superuser %}
    <a href="/admin/" class="nav-link">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Admin
    </a>
    {% endif %}
  </nav>

  <div class="sidebar-footer">
    <!-- Theme toggle -->
    <button onclick="toggleTheme()" id="theme-btn" class="nav-link" style="width:100%; background:none; border:none; cursor:pointer; text-align:left;">
      <svg id="theme-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:16px;height:16px;flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span id="theme-label">Light Mode</span>
    </button>

    <a href="{% url 'user_logout' %}" class="nav-link" style="color: var(--danger);">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Logout
    </a>
  </div>

</div>

<div class="main-wrap">
  {% block content %}{% endblock content %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    document.getElementById('theme-label').textContent = isLight ? 'Dark Mode' : 'Light Mode';
    document.getElementById('theme-icon').innerHTML = isLight
      ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>'
      : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>';
  }

  // remember preference on page load
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-label').textContent = 'Dark Mode';
    document.getElementById('theme-icon').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>';
  }
  function openSidebar() {
  document.querySelector('.sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
// close sidebar when a nav link is clicked on mobile
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', closeSidebar);
});

</script>

</body>
</html>
