<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
</head>
<body>
    <h1>Product List</h1>
    <a href="products/add/">Add product</a>
    <hr>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>SKU</th>
        </tr>
        {% for product in products %}
        <tr>
            <td>{{ product.name }}</td>
            <td>{{ product.category }}</td>
            <td>{{ product.price }}</td>
            <td>{{ product.sku }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No products available</td>
        </tr>
        {% endfor %}
    </table>
    
</body>
</html>
