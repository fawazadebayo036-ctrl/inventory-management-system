{% extends "products/base.html" %}

{% load crispy_forms_tags %}
{% block content %}
    <div class="row">
        <div class="col-md-4 mx-auto mt-5">
            <h1>Sign In </h1>
            {% if form.errors %}
            {% for error in field.errors %}
                <div class="alert alert-danger">
                    <strong>{{ error|escape }}</strong>
                 </div>
            {% endfor %}
        {% endif %}
        <form action="" method="post">
            {% csrf_token %}
            {{ form|crispy }}

            <button type="submit">Login</button>
        </form>    
        <div class="pt-3">
            <small class="text-muted">Need an account? <a href="{% url "register" %}" class="ml-2">Sign Up</a></small>
        </div>
        </div>
    </div>

{% endblock content %}
