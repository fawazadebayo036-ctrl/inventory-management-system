{% extends "products/base.html" %}

{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header">
            <h4>Edit Product</h4>
        </div>

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-primary">
                    Save Changes
                </button>

                <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
